<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" role="img" aria-label="COMUX">
  <defs>
    <linearGradient id="fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8b4fe"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-45%" width="120%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.45 0 0 0 0 0.16 0 0 0 0 0.95 0 0 0 0.72 0" result="purpleGlow"/>
      <feMerge>
        <feMergeNode in="purpleGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="300" rx="48" fill="#050507"/>
  <text x="640" y="152" text-anchor="middle" dominant-baseline="middle" fill="url(#fill)" filter="url(#glow)" font-family="Georgia, 'Times New Roman', ui-serif, serif" font-size="178" font-weight="800" letter-spacing="-4">COMUX</text>
</svg>
