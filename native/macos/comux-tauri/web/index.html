<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>comux</title>
    <link rel="stylesheet" href="./xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./xterm.js"></script>
    <script src="./xterm-addon-fit.js"></script>
    <script src="./xterm-addon-webgl.js"></script>
  </head>
  <body>
    <div class="app" id="app">
      <header class="titlebar" data-tauri-drag-region>
        <div class="titlebar-left" data-tauri-drag-region>
          <span class="brand" data-tauri-drag-region>comux</span>
          <span class="brand-sub" data-tauri-drag-region>workspace</span>
        </div>
        <div class="titlebar-center" data-tauri-drag-region></div>
        <div class="titlebar-right" data-tauri-drag-region>
          <button
            id="browser-toggle"
            class="chrome-btn"
            title="Show browser preview (⌘⌥B). Right-click to cycle side."
            aria-pressed="false"
          >
            <svg viewBox="0 0 14 14" width="14" height="14" aria-hidden="true">
              <rect x="1.25" y="2.25" width="11.5" height="9.5" rx="1.6"
                    fill="none" stroke="currentColor" stroke-width="1.3"/>
              <line x1="9" y1="2.25" x2="9" y2="11.75"
                    stroke="currentColor" stroke-width="1.3"/>
              <path class="panel-fill"
                    d="M9 2.25 H11.15 a1.6 1.6 0 0 1 1.6 1.6 V10.15 a1.6 1.6 0 0 1 -1.6 1.6 H9 Z"
                    fill="currentColor" opacity="0"/>
            </svg>
          </button>
          <span class="status-pill" id="shell-status" hidden>starting…</span>
        </div>
      </header>

      <main class="detail" id="detail" data-layout="terminal" data-browser-side="right">
        <section class="terminal-area">
          <div class="tab-strip" id="tab-strip"></div>
          <div class="terminal-host" id="terminal-host"></div>
          <div class="command-bar" id="command-bar">
            <span class="command-prompt">›</span>
            <input
              id="command-input"
              type="text"
              spellcheck="false"
              autocomplete="off"
              placeholder="Slash command — comux (/new-thread, /preview), agent skills + plugins (/security-review, /myplugin:foo), or any text → active terminal"
            />
          </div>
          <div class="palette" id="palette" hidden></div>
        </section>
        <div
          class="splitter"
          id="splitter"
          role="separator"
          aria-orientation="vertical"
          aria-valuemin="25"
          aria-valuemax="85"
          aria-valuenow="60"
          tabindex="0"
          title="Resize terminal and browser panes"
        ></div>
        <section class="browser-pane">
          <header class="pane-header browser-bar">
            <button id="browser-collapse" class="icon-btn ghost-btn" title="Hide browser (⌘⌥B)" aria-label="Hide browser">
              <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M4.5 6.25 8 9.75l3.5-3.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="browser-cycle-side" class="icon-btn side-trigger" title="Move browser pane (⌘⇧B)" aria-label="Move browser pane">
              <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><rect x="2.5" y="3" width="11" height="10" rx="1.8" fill="none" stroke="currentColor" stroke-width="1.35"/><path d="M6.4 3v10" fill="none" stroke="currentColor" stroke-width="1.35"/><path class="side-trigger-fill" d="M2.5 4.8c0-1 .8-1.8 1.8-1.8h2.1v10H4.3c-1 0-1.8-.8-1.8-1.8z" fill="currentColor" opacity=".18"/></svg>
            </button>
            <button id="back" class="icon-btn nav-btn" title="Back" aria-label="Back">
              <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M9.75 4.25 6 8l3.75 3.75" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="forward" class="icon-btn nav-btn" title="Forward" aria-label="Forward">
              <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M6.25 4.25 10 8l-3.75 3.75" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="reload" class="icon-btn nav-btn" title="Reload" aria-label="Reload">
              <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M12.2 6.2A4.6 4.6 0 1 0 12.6 9" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round"/><path d="M12.25 3.8v2.7h-2.7" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <input id="url" type="url" placeholder="example.com or localhost:5173 — Enter to load" />
            <button id="open-external" class="icon-btn ghost-btn" title="Open in default browser" aria-label="Open in default browser">↗</button>
          </header>
          <div id="browser-tab-strip" class="browser-tab-strip"></div>
          <div id="preview" class="preview-placeholder">
            <div class="preview-empty">No browser tab yet — type a URL above or press +</div>
          </div>
        </section>
      </main>
    </div>
    <script src="./main.js" defer></script>
  </body>
</html>
